<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="grok-be-gone.css" />
  </head>
  <body class="popup">
    <header class="header">
      <div class="header__top">
        <div class="header__brand">
          <h1 class="header__title">Grok Be Gone!</h1>
          <p class="header__tagline">Less noise on X</p>
        </div>
      </div>
    </header>

    <main class="popup__main">
      <section class="section" aria-labelledby="section-timeline-heading">
        <div class="panel">
          <h2 class="section__heading" id="section-timeline-heading">
            Timeline
          </h2>
          <ul
            class="checklist checklist--stack checklist--grok"
            id="grok-gone-grok-checklist"
            aria-labelledby="section-timeline-heading"
          ></ul>
        </div>
      </section>

      <section class="section" aria-labelledby="section-sidebar-heading">
        <div class="panel">
          <h2 class="section__heading" id="section-sidebar-heading">
            Sidebar
          </h2>

          <ul
            class="checklist checklist--stack checklist--sidebar-master"
            id="sidebar-master-list"
            aria-labelledby="section-sidebar-heading"
          ></ul>

          <details class="sidebar-fine controls-shell">
            <summary class="sidebar-fine__summary">
              Fine-tune individual items
            </summary>
            <div class="sidebar-fine__body">
              <ul
                class="checklist checklist--fine-tune"
                id="grok-gone-sidebar-checklist"
              ></ul>
            </div>
          </details>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__text">
        <span class="footer__label">Made by</span>
        <a
          class="footer__link"
          href="https://x.com/gonzalorossidev"
          target="_blank"
          rel="noreferrer noopener"
        >
          Gonzalo Rossi
        </a>
        <span class="footer__flag" aria-hidden="true">🇦🇷</span>
      </p>
    </footer>
    <script src="grok-be-gone-popup.js" defer></script>
  </body>
</html>
